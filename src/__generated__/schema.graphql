schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

type AlternativeRoleGroupModel {
  groupId: String!
  resolution: String!
  roles: [String!]!
}

input AnswerQuestionInput {
  answer: JSON!
  inboxId: ID!
  resolvedBy: String
}

input CreateRunInput {
  description: String
  params: JSON
  pipelineId: String
  playbookId: String
  priority: Int
  repo: String!
  scope: String
  start: Boolean! = false
  title: String!
}

type CreateRunResultModel {
  eventId: ID!
  route: JSON
  runId: ID!
  started: Boolean!
  status: String!
  taskId: ID!
  workflow: JSON
}

type DaemonStatusModel {
  baseUrl: String
  healthy: Boolean!
  httpPort: Int
  pgPort: Int
  pid: Int
  running: Boolean!
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

type DoctorResultModel {
  issues: [String!]!
  ok: Boolean!
  status: SystemStatusModel!
}

input GateDecisionInput {
  inboxId: ID!
  resolvedBy: String
}

type GateRiskModel {
  context: JSON
  inboxId: ID!
  kind: String!
  options: JSON
  risk: String!
  title: String!
  topic: String
}

input GetRunAttemptsInput {
  after: String
  first: Int! = 50
  runId: ID!
}

input GetRunEventsInput {
  after: String
  first: Int! = 50
  runId: ID!
  type: String
}

type InboxConnection {
  edges: [InboxItemModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type InboxItemModel {
  answer: JSON
  context: JSON
  createdAt: DateTime!
  id: ID!
  kind: String!
  options: JSON
  projectId: String
  resolvedAt: DateTime
  resolvedBy: String
  runId: String
  status: String!
  stepId: String
  taskId: String
  title: String!
}

type InboxItemModelEdge {
  cursor: String!
  node: InboxItemModel!
}

type InboxResolutionModel {
  answer: JSON
  inboxId: ID!
  previousStatus: String!
  runId: String
  signaled: Boolean!
  topic: String
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

input ListInboxInput {
  after: String
  first: Int! = 50
  runId: String
  status: String
}

input ListMethodInput {
  after: String
  first: Int! = 50
}

input ListRunsInput {
  after: String
  first: Int! = 50
  status: String
}

type Mutation {
  answerQuestion(data: AnswerQuestionInput!): InboxResolutionModel!
  approveGate(data: GateDecisionInput!): InboxResolutionModel!
  createRun(data: CreateRunInput!): CreateRunResultModel!
  rejectGate(data: GateDecisionInput!): InboxResolutionModel!
  resolveInboxItem(data: ResolveInboxItemInput!): InboxResolutionModel!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type PipelineConnection {
  edges: [PipelineModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PipelineModel {
  alternativeRoles: [AlternativeRoleGroupModel!]!
  executionPolicy: JSON
  id: ID!
  optionalRoles: [String!]!
  path: String!
  pipelineId: String!
  playbookId: String!
  requiredRoles: [String!]!
  routeGates: [String!]!
  triggers: [String!]!
}

type PipelineModelEdge {
  cursor: String!
  node: PipelineModel!
}

type PlaybookConnection {
  edges: [PlaybookModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PlaybookModel {
  id: ID!
  name: String!
  packageName: String!
  schemaVersion: Int!
  source: String!
  version: String!
}

type PlaybookModelEdge {
  cursor: String!
  node: PlaybookModel!
}

type PrCheckModel {
  name: String!
  result: String!
}

type PrChecksModel {
  fail: [String!]!
  list: [PrCheckModel!]!
  pass: [String!]!
  pending: [String!]!
  terminal: [String!]!
}

type PrFeedbackItemModel {
  author: String
  evidence: String
  location: String
  provider: String
  reason: String
  severity: String
  source: String
  summary: String
}

type PrFeedbackModel {
  developerFixes: [PrFeedbackItemModel!]!
  humanDecisions: [PrFeedbackItemModel!]!
  ignoredNoise: [PrFeedbackItemModel!]!
  providerWait: [PrFeedbackItemModel!]!
  residualRisks: [String!]!
  reviewerQuestions: [PrFeedbackItemModel!]!
}

type PrInfoModel {
  base: String!
  draft: Boolean!
  head: String!
  headSha: String!
  mergeState: String!
  number: Int
  state: String!
  url: String!
}

input PrReadinessInput {
  baseBranch: String
  headBranch: String
  includeComments: Boolean
  includeReviewThreads: Boolean
  prNumber: Int
  repo: String!
  sonarProject: String
}

type PrReadinessModel {
  checks: PrChecksModel!
  ciSummary: JSON!
  evidence: [String!]!
  feedback: PrFeedbackModel!
  nextAction: String!
  pr: PrInfoModel!
  providerState: JSON!
  reviewDecision: String!
  reviewThreads: PrReviewThreadsModel!
  sonar: PrSonarModel!
  verdict: String!
}

type PrReviewThreadModel {
  author: String
  body: String!
  id: String!
  isOutdated: Boolean!
  isResolved: Boolean!
  line: Int
  path: String
  url: String
}

type PrReviewThreadsModel {
  included: Boolean!
  items: [PrReviewThreadModel!]!
  unresolvedCount: Int!
}

type PrSonarHotspotModel {
  component: String!
  line: Int
  message: String!
  securityCategory: String
  vulnerabilityProbability: String
}

type PrSonarIssueModel {
  component: String!
  line: Int
  message: String!
  rule: String
  severity: String!
}

type PrSonarModel {
  configured: Boolean!
  hotspots: [PrSonarHotspotModel!]!
  issues: [PrSonarIssueModel!]!
  unavailable: Boolean!
}

type ProjectModel {
  branch: String!
  dataDir: String!
  org: String!
  project: String!
}

type Query {
  doctor: DoctorResultModel!
  gateRisk(id: ID!): GateRiskModel!
  inbox(data: ListInboxInput): InboxConnection!
  inboxItem(id: ID!): InboxItemModel!
  pendingDecisions(runId: String): [InboxItemModel!]!
  pipeline(id: ID!): PipelineModel!
  pipelines(data: ListMethodInput): PipelineConnection!
  playbooks(data: ListMethodInput): PlaybookConnection!
  prFeedback(data: PrReadinessInput!): JSON!
  prFeedbackTyped(data: PrReadinessInput!): PrFeedbackModel!
  prReadiness(data: PrReadinessInput!): JSON!
  prReadinessTyped(data: PrReadinessInput!): PrReadinessModel!
  project: ProjectModel!
  repositoryContext(repo: String!): RepositoryContextModel!
  role(id: ID!): RoleModel!
  roles(data: ListMethodInput): RoleConnection!
  run(id: ID!): RunModel!
  runAttempts(data: GetRunAttemptsInput!): RunAttemptConnection!
  runDigest(id: ID!): RunDigestModel!
  runEvents(data: GetRunEventsInput!): RunEventConnection!
  runProgress(id: ID!): RunProgressModel!
  runWorkflow(id: ID!): RunWorkflowModel!
  runs(data: ListRunsInput): RunConnection!
  simulateRoute(data: SimulateRouteInput!): JSON!
  status: SystemStatusModel!
  validateRepository(repo: String!): RepositoryValidationModel!
}

type RepositoryContextModel {
  branch: String!
  clean: Boolean!
  error: String!
  exists: Boolean!
  files: [RepositoryGuidanceFileModel!]!
  gitRoot: String!
  input: String!
  isDirectory: Boolean!
  packageError: String!
  packageName: String!
  path: String!
  remote: String!
  scripts: [RepositoryScriptModel!]!
}

type RepositoryGuidanceFileModel {
  exists: Boolean!
  path: String!
}

type RepositoryScriptModel {
  command: String!
  name: String!
}

type RepositoryValidationModel {
  branch: String!
  clean: Boolean!
  error: String!
  exists: Boolean!
  gitRoot: String!
  input: String!
  isDirectory: Boolean!
  path: String!
  remote: String!
}

input ResolveInboxItemInput {
  answer: JSON!
  inboxId: ID!
  resolvedBy: String
  signalGate: Boolean! = true
}

type RoleConnection {
  edges: [RoleModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RoleModel {
  allowedTools: [String!]
  effort: String
  id: ID!
  modelLevel: String!
  name: String!
  permissionMode: String
  playbookId: String
  playbookRoleId: String
  rights: String
  runner: String!
  scopeRules: JSON
  sourceHash: String
  sourcePath: String
  surface: String
  systemPrompt: String
  timeoutMs: Int
}

type RoleModelEdge {
  cursor: String!
  node: RoleModel!
}

type RunActivityItemModel {
  actor: String!
  createdAt: DateTime!
  id: ID!
  payload: JSON
  summary: String!
  type: String!
}

type RunAttemptConnection {
  edges: [RunAttemptModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RunAttemptModel {
  artifactRef: String!
  costAmount: Float!
  currency: String!
  durationMs: Int!
  error: String!
  id: ID!
  inputTokens: Int!
  iteration: Int!
  lesson: String!
  modelProfile: String!
  outputSummary: String!
  outputTokens: Int!
  runId: ID!
  startedAt: DateTime!
  status: String!
  stepId: String!
  stepKey: String!
  verdict: String!
}

type RunAttemptModelEdge {
  cursor: String!
  node: RunAttemptModel!
}

type RunConnection {
  edges: [RunModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RunCostModel {
  attemptId: String!
  costAmount: Float!
  currency: String!
  id: ID!
  inputTokens: Int!
  modelProfile: String!
  outputTokens: Int!
  recordedAt: DateTime!
  runId: ID!
  stepId: String!
}

type RunDigestModel {
  latestEvents: [RunEventModel!]!
  pendingInbox: [InboxItemModel!]!
  run: RunModel!
  usage: UsageModel!
}

type RunEventConnection {
  edges: [RunEventModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RunEventModel {
  actor: String!
  createdAt: DateTime!
  id: ID!
  payload: JSON
  runId: ID!
  stepId: String!
  taskId: String!
  type: String!
}

type RunEventModelEdge {
  cursor: String!
  node: RunEventModel!
}

type RunGateStateModel {
  answer: JSON
  inboxId: ID
  nodeId: ID!
  status: String!
  topic: String!
}

type RunModel {
  createdAt: DateTime!
  description: String
  digest: RunDigestModel!
  events(after: String, first: Int! = 50, type: String): RunEventConnection!
  id: ID!
  priority: Int!
  progress: RunProgressModel!
  repos: [String!]!
  scope: String
  status: String!
  title: String!
}

type RunModelEdge {
  cursor: String!
  node: RunModel!
}

type RunProgressModel {
  graphCursor: JSON
  updatedAt: DateTime!
  workflowStatus: String!
}

input RunSubscriptionInput {
  runId: ID
}

type RunWorkflowEdgeModel {
  from: ID!
  kind: String!
  label: String!
  to: ID!
}

type RunWorkflowModel {
  activity: [RunActivityItemModel!]!
  attempts: [RunAttemptModel!]!
  currentNodeIds: [String!]!
  edges: [RunWorkflowEdgeModel!]!
  gates: [RunGateStateModel!]!
  nodes: [RunWorkflowNodeModel!]!
  pendingInbox: [InboxItemModel!]!
  pipeline: RunWorkflowPipelineModel!
  run: RunModel!
  usage: UsageModel!
}

type RunWorkflowNodeModel {
  attemptCount: Int!
  costAmount: Float!
  id: ID!
  inboxId: ID
  inputTokens: Int!
  kind: String!
  label: String!
  metadata: JSON
  modelLevel: String
  outputTokens: Int!
  roleId: String
  runner: String
  scriptId: String
  status: String!
  verdict: String
}

type RunWorkflowPipelineModel {
  activeNodeIds: [String!]!
  id: ID!
  pipelineId: String!
  playbookId: String!
  routeGates: [String!]!
  status: String!
  title: String!
}

input SimulateRouteInput {
  params: JSON
  pipeline: String
  playbookId: String
  repo: String
  title: String!
}

type Subscription {
  inboxItemAdded(data: RunSubscriptionInput): InboxItemModel!
  inboxItemResolved(data: RunSubscriptionInput): InboxItemModel!
  runCostRecorded(data: RunSubscriptionInput): RunCostModel!
  runEventAppended(data: RunSubscriptionInput): RunEventModel!
  runProgressUpdated(data: RunSubscriptionInput): RunProgressModel!
  runUpdated(data: RunSubscriptionInput): RunModel!
  runWorkflowUpdated(data: RunSubscriptionInput): RunWorkflowModel!
}

type SystemStatusModel {
  daemon: DaemonStatusModel!
  project: ProjectModel!
}

type UsageModel {
  costAmount: Float!
  inputTokens: Int!
  outputTokens: Int!
}